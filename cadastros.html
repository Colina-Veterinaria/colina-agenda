<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colina Veterinária | Cadastros</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="registry-page">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="34" height="34" viewBox="0 0 52 52" fill="none">
            <circle cx="26" cy="26" r="25" fill="white" stroke="#C9A84C" stroke-width="2"></circle>
            <circle cx="14" cy="22" r="5" fill="#F5E642"></circle>
            <polyline points="4,38 16,16 28,38" fill="none" stroke="#7A4F2D" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></polyline>
            <polyline points="20,38 32,22 44,38" fill="none" stroke="#7A4F2D" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></polyline>
          </svg>
        </div>
        <div class="brand-copy">
          <div class="brand-name">Colina</div>
          <div class="brand-sub">Clínica Veterinária</div>
        </div>
      </div>

      <nav class="screen-switch" aria-label="Navegação entre telas">
        <a class="screen-link" href="template.html">Agenda da Parede</a>
        <a class="screen-link" href="recepcao.html">Recepção</a>
        <a class="screen-link active" href="cadastros.html">Cadastros</a>
        <a class="screen-link" href="frequencia.html">Frequência</a>
      </nav>

      <div class="topbar-aside">
        <div class="context-card">
          <div class="context-kicker">Base da clínica</div>
          <div class="context-title">Clientes e pets</div>
        </div>

        <div class="clock-card">
          <div class="clock-time" id="clockTime">--:--</div>
          <div class="clock-date" id="clockDate"></div>
        </div>
      </div>
    </header>

    <main class="page-main">
      <section class="summary-strip panel">
        <h1 class="section-title">Cadastros</h1>
        <div class="reception-summary" id="registrySummary"></div>
      </section>

      <section class="reception-grid registry-grid">
        <aside class="appointments-panel panel registry-master">
          <div class="panel-heading panel-heading-compact panel-heading-inline">
            <h2 class="section-title">Clientes</h2>
            <button type="button" class="primary-button" id="newCustomerBtn">+ Novo cliente</button>
          </div>

          <div class="registry-toolbar">
            <input type="search" id="registrySearch" name="registrySearch" placeholder="Buscar por cliente, pet ou telefone">
          </div>

          <div class="registry-list-scroll">
            <div class="registry-list" id="registryList"></div>
          </div>
        </aside>

        <section class="form-panel panel registry-detail" id="detailPanel"></section>
      </section>
    </main>

    <footer class="app-footer">
      <div class="status-online">Conectado</div>
      <div id="footerUpdated"></div>
    </footer>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/cadastros.js"></script>
</body>
</html>
