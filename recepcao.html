<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colina Veterinária | Recepção</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="reception-page">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="34" height="34" viewBox="0 0 52 52" fill="none">
            <circle cx="26" cy="26" r="25" fill="white" stroke="#C9A84C" stroke-width="2"></circle>
            <circle cx="14" cy="22" r="5" fill="#F5E642"></circle>
            <polyline points="4,38 16,16 28,38" fill="none" stroke="#7A4F2D" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></polyline>
            <polyline points="20,38 32,22 44,38" fill="none" stroke="#7A4F2D" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></polyline>
          </svg>
        </div>
        <div class="brand-copy">
          <div class="brand-name">Colina</div>
          <div class="brand-sub">Clínica Veterinária</div>
        </div>
      </div>

      <nav class="screen-switch" aria-label="Navegação entre telas">
        <a class="screen-link" href="template.html">Agenda da Parede</a>
        <a class="screen-link active" href="recepcao.html">Recepção</a>
        <a class="screen-link" href="cadastros.html">Cadastros</a>
        <a class="screen-link" href="frequencia.html">Frequência</a>
      </nav>

      <div class="day-nav" aria-label="Navegação entre dias">
        <button type="button" class="day-arrow" id="prevDay" aria-label="Dia anterior">‹</button>
        <div class="day-pills" id="dayPills"></div>
        <button type="button" class="day-arrow" id="nextDay" aria-label="Próximo dia">›</button>
      </div>

      <div class="clock-card">
        <div class="clock-time" id="clockTime">--:--</div>
        <div class="clock-date" id="clockDate"></div>
      </div>
    </header>

    <main class="page-main">
      <section class="summary-strip panel">
        <div>
          <p class="eyebrow">Recepção</p>
          <h1 class="section-title">Central de agendamentos</h1>
        </div>
        <div class="reception-summary" id="receptionSummary"></div>
      </section>

      <section class="reception-grid">
        <div class="stack">
          <section class="form-panel panel">
            <h2 class="section-title">Novo agendamento</h2>

            <form id="appointmentForm">
              <div class="form-grid">
                <div class="field">
                  <label class="field-label" for="appointmentDate">Data</label>
                  <input type="date" id="appointmentDate" name="appointmentDate" required>
                </div>

                <div class="field">
                  <label class="field-label" for="arrivalTime">Chegada</label>
                  <input type="time" id="arrivalTime" name="arrivalTime" step="900" required>
                </div>

                <div class="field is-wide">
                  <div class="field-row">
                    <label class="field-label" for="customerLookup">Buscar cliente</label>
                    <a class="text-link" href="cadastros.html">Abrir tela de cadastros</a>
                  </div>
                  <div class="search-shell">
                    <input type="search" id="customerLookup" name="customerLookup" placeholder="Pesquisar por cliente, pet ou telefone" autocomplete="off">
                    <div class="search-results" id="lookupResults"></div>
                  </div>
                </div>

                <div class="field is-wide">
                  <span class="field-label">Cadastro selecionado</span>
                  <div class="selection-line" id="selectedProfileLine"></div>
                </div>

                <div class="field is-wide" id="petPickerField" hidden>
                  <div class="pet-picker" id="petPicker"></div>
                </div>

                <div class="field is-wide">
                  <span class="field-label">Serviços</span>
                  <div class="service-options">
                    <div class="check-card">
                      <label for="bath">
                        <input type="checkbox" id="bath" name="bath">
                        Incluir banho
                      </label>
                    </div>

                    <div class="field">
                      <label class="field-label" for="groomingType">Tosa</label>
                      <select id="groomingType" name="groomingType">
                        <option value="">Sem tosa</option>
                        <option value="higienica">Tosa Higiênica</option>
                        <option value="tesoura">Tosa Tesoura</option>
                        <option value="maquina">Tosa Máquina</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="field is-wide">
                  <label class="field-label" for="notes">Observação</label>
                  <textarea id="notes" name="notes" placeholder="Orientações de retirada, preferências do cliente ou cuidados do pet"></textarea>
                </div>
              </div>

              <div class="submit-row">
                <button type="submit" class="primary-button">Salvar agendamento</button>
              </div>

              <div class="feedback" id="formFeedback" role="status" aria-live="polite"></div>
            </form>
          </section>

          <section class="appointments-panel panel">
            <p class="eyebrow">Visão rápida do dia</p>
            <h2 class="section-title" id="appointmentsTitle"></h2>
            <div class="today-groups" id="todayGroups"></div>
          </section>
        </div>

        <aside class="stack">
          <section class="insights-card panel-dark">
            <div class="insights-section">
              <h2 class="insights-heading">🏆 Serviços do mês</h2>
              <div class="service-rank-list" id="serviceRankList"></div>
            </div>

            <div class="insights-section">
              <h2 class="insights-heading">🐾 Pets frequentes</h2>
              <div class="frequent-list" id="frequentList"></div>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <footer class="app-footer">
      <div class="status-online">Conectado</div>
      <div id="footerUpdated"></div>
    </footer>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/recepcao.js"></script>
</body>
</html>
