<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colina Veterinária | Agenda da Parede</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="wall-page">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="34" height="34" viewBox="0 0 52 52" fill="none">
            <circle cx="26" cy="26" r="25" fill="white" stroke="#C9A84C" stroke-width="2"></circle>
            <circle cx="14" cy="22" r="5" fill="#F5E642"></circle>
            <polyline points="4,38 16,16 28,38" fill="none" stroke="#7A4F2D" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></polyline>
            <polyline points="20,38 32,22 44,38" fill="none" stroke="#7A4F2D" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></polyline>
          </svg>
        </div>
        <div class="brand-copy">
          <div class="brand-name">Colina</div>
          <div class="brand-sub">Clínica Veterinária</div>
        </div>
      </div>

      <nav class="screen-switch" aria-label="Navegação entre telas">
        <a class="screen-link active" href="template.html">Agenda da Parede</a>
        <a class="screen-link" href="recepcao.html">Recepção</a>
        <a class="screen-link" href="cadastros.html">Cadastros</a>
        <a class="screen-link" href="frequencia.html">Frequência</a>
      </nav>

      <div class="topbar-aside">
        <div class="day-nav" aria-label="Navegação entre dias">
          <button type="button" class="day-arrow" id="prevDay" aria-label="Dia anterior">‹</button>
          <div class="day-pills" id="dayPills"></div>
          <button type="button" class="day-arrow" id="nextDay" aria-label="Próximo dia">›</button>
        </div>

        <div class="clock-card">
          <div class="clock-time" id="clockTime">--:--</div>
          <div class="clock-date" id="clockDate"></div>
        </div>
      </div>
    </header>

    <main class="page-main">
      <section class="summary-strip panel">
        <div class="turno-tabs" aria-label="Seleção de turno">
          <button type="button" class="turno-btn" id="turnoManha">
            <div class="turno-name">🌤️ Manhã</div>
            <div class="turno-meta">
              <span class="turno-count" id="countManha">0 agendados</span>
              <span>07h às 12h</span>
            </div>
          </button>
          <button type="button" class="turno-btn" id="turnoTarde">
            <div class="turno-name">☀️ Tarde</div>
            <div class="turno-meta">
              <span class="turno-count" id="countTarde">0 agendados</span>
              <span>12h às 18h</span>
            </div>
          </button>
        </div>

        <div class="summary-chips" id="agendaSummary"></div>
      </section>

      <section class="table-panel panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Agenda da Parede</p>
            <h1 class="section-title" id="agendaTitle"></h1>
          </div>
          <div class="heading-badge" id="agendaShiftBadge"></div>
        </div>

        <div class="table-scroll">
          <table class="agenda-table">
            <colgroup>
              <col><col><col><col><col><col><col><col>
            </colgroup>
            <thead>
              <tr>
                <th>Chegada</th>
                <th>Telefone</th>
                <th>Cliente</th>
                <th>Pet</th>
                <th>Raça</th>
                <th>Banho</th>
                <th>Tosa</th>
                <th>Observação</th>
              </tr>
            </thead>
            <tbody id="agendaTableBody"></tbody>
          </table>
        </div>

        <div class="panel-footer" id="agendaFooter"></div>
      </section>
    </main>

    <footer class="app-footer">
      <div class="status-online">Conectado</div>
      <div id="footerUpdated"></div>
    </footer>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/agenda.js"></script>
</body>
</html>
