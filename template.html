<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colina Veterinária | Agenda da Parede</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="wall-page">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="34" height="34" viewBox="0 0 52 52" fill="none">
            <circle cx="26" cy="26" r="25" fill="white" stroke="#C9A84C" stroke-width="2"></circle>
            <circle cx="14" cy="22" r="5" fill="#F5E642"></circle>
            <polyline points="4,38 16,16 28,38" fill="none" stroke="#7A4F2D" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></polyline>
            <polyline points="20,38 32,22 44,38" fill="none" stroke="#7A4F2D" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></polyline>
          </svg>
        </div>
        <div class="brand-copy">
          <div class="brand-name">Colina</div>
          <div class="brand-sub">Clínica Veterinária</div>
        </div>
      </div>

      <nav class="screen-switch" aria-label="Navegação entre telas">
        <a class="screen-link active" href="template.html">Agenda da Parede</a>
        <a class="screen-link" href="recepcao.html">Recepção</a>
        <a class="screen-link" href="cadastros.html">Cadastros</a>
        <a class="screen-link" href="frequencia.html">Frequência</a>
      </nav>

      <div class="topbar-aside">
        <div class="day-nav" aria-label="Navegação entre dias">
          <button type="button" class="day-arrow" id="prevDay" aria-label="Dia anterior">‹</button>
          <div class="day-pills" id="dayPills"></div>
          <button type="button" class="day-arrow" id="nextDay" aria-label="Próximo dia">›</button>
        </div>

        <div class="clock-card">
          <div class="clock-time" id="clockTime">--:--</div>
          <div class="clock-date" id="clockDate"></div>
        </div>
      </div>
    </header>

    <main class="page-main">
      <section class="summary-strip panel">
        <div class="turno-tabs" aria-label="Seleção de turno">
          <button type="button" class="turno-btn" id="turnoManha">
            <div class="turno-name">🌤️ Manhã</div>
            <div class="turno-meta">
              <span class="turno-count" id="countManha">0 agendados</span>
              <span>07h às 12h</span>
            </div>
          </button>
          <button type="button" class="turno-btn" id="turnoTarde">
            <div class="turno-name">☀️ Tarde</div>
            <div class="turno-meta">
              <span class="turno-count" id="countTarde">0 agendados</span>
              <span>12h às 18h</span>
            </div>
          </button>
        </div>

        <div class="summary-chips" id="agendaSummary"></div>
      </section>

      <section class="table-panel panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Agenda da Parede</p>
            <h1 class="section-title" id="agendaTitle"></h1>
          </div>
          <div class="heading-badge" id="agendaShiftBadge"></div>
        </div>

        <div class="table-scroll">
          <table class="agenda-table">
            <colgroup>
              <col><col><col><col><col><col><col><col><col><col>
            </colgroup>
            <thead>
              <tr>
                <th>Chegada</th>
                <th>Telefone</th>
                <th>Cliente</th>
                <th>Pet</th>
                <th>Raça</th>
                <th>Banho</th>
                <th>Tele</th>
                <th>Tosa</th>
                <th>Valor</th>
                <th>Observação</th>
              </tr>
            </thead>
            <tbody id="agendaTableBody"></tbody>
          </table>
        </div>

        <div class="panel-footer" id="agendaFooter"></div>
      </section>
    </main>

    <footer class="app-footer">
      <div class="status-online">Conectado</div>
      <div id="footerUpdated"></div>
    </footer>
  </div>

  <div class="modal-overlay" id="appointmentEditOverlay" aria-hidden="true">
    <div class="modal-dialog appointment-edit-dialog">
      <div class="modal-body">
        <div class="panel-heading panel-heading-compact panel-heading-inline">
          <div>
            <p class="eyebrow">Agenda da Parede</p>
            <h2 class="section-title">Editar agendamento</h2>
          </div>
          <button type="button" class="secondary-button" id="appointmentEditClose">Fechar</button>
        </div>

        <form id="appointmentEditForm">
          <div class="form-grid">
            <div class="field">
              <label class="field-label" for="editAppointmentDate">Data</label>
              <input type="date" id="editAppointmentDate" name="editAppointmentDate" required>
            </div>

            <div class="field">
              <label class="field-label" for="editArrivalTime">Chegada</label>
              <input type="time" id="editArrivalTime" name="editArrivalTime" step="900" required>
            </div>

            <div class="field is-wide">
              <label class="field-label" for="editCustomerLookup">Buscar cliente</label>
              <div class="search-shell">
                <input type="search" id="editCustomerLookup" name="editCustomerLookup" placeholder="Pesquisar por cliente, pet ou telefone" autocomplete="off">
                <div class="search-results" id="editLookupResults"></div>
              </div>
            </div>

            <div class="field is-wide">
              <span class="field-label">Cadastro selecionado</span>
              <div class="selection-line" id="editSelectedProfileLine"></div>
            </div>

            <div class="field is-wide" id="editPetPickerField" hidden>
              <div class="pet-picker" id="editPetPicker"></div>
            </div>

            <div class="field is-wide">
              <span class="field-label">Serviços</span>
              <div class="service-options">
                <div class="check-card">
                  <label for="editBath">
                    <input type="checkbox" id="editBath" name="editBath">
                    Incluir banho
                  </label>
                </div>

                <div class="check-card">
                  <label for="editTele">
                    <input type="checkbox" id="editTele" name="editTele">
                    Tele (busca do pet)
                  </label>
                </div>

                <div class="field">
                  <label class="field-label" for="editGroomingType">Tosa</label>
                  <select id="editGroomingType" name="editGroomingType">
                    <option value="">Sem tosa</option>
                    <option value="higienica">Tosa Higiênica</option>
                    <option value="tesoura">Tosa Tesoura</option>
                    <option value="maquina">Tosa Máquina</option>
                  </select>
                </div>

                <div class="field">
                  <label class="field-label" for="editChargedAmount">Valor cobrado</label>
                  <input type="text" id="editChargedAmount" name="editChargedAmount" inputmode="decimal" placeholder="Opcional">
                </div>
              </div>
            </div>

            <div class="field is-wide">
              <label class="field-label" for="editNotes">Observação</label>
              <textarea id="editNotes" name="editNotes" placeholder="Orientações de retirada, preferências do cliente ou cuidados do pet"></textarea>
            </div>
          </div>

          <div class="submit-row">
            <button type="button" class="secondary-button" id="appointmentEditCancel">Cancelar</button>
            <button type="submit" class="primary-button" id="appointmentEditSubmit">Salvar alterações</button>
          </div>

          <div class="feedback" id="appointmentEditFeedback" role="status" aria-live="polite"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/agenda.js"></script>
</body>
</html>
